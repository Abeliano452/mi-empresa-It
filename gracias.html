<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mensaje Recibido! | NET_SUPPORT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #334155;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 400px;
        }

        .icon {
            font-size: 4rem;
            color: #10b981; /* Verde éxito */
            margin-bottom: 20px;
        }

        h1 { color: var(--text-light); margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; }

        .btn-home {
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-home:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>¡Todo listo!</h1>
        <p>Hemos recibido tu información correctamente. Nuestro equipo técnico se pondrá en contacto contigo muy pronto.</p>
        <a href="index.html" class="btn-home">Volver al Inicio</a>
    </div>

</body>
</html>
