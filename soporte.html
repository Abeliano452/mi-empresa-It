<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico | NET_SUPPORT</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d4ff;
            --primary-hover: #008cb1;
            --bg-dark: #050a18;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --whatsapp: #25d366;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #0c1e35, var(--bg-dark));
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN ESTILIZADA --- */
        header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 1.2rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-decoration: none;
            letter-spacing: -1px;
        }

        nav a { 
            color: var(--text-main); 
            text-decoration: none; 
            margin-left: 25px; 
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.3s;
            opacity: 0.8;
        }

        nav a:hover, nav a.active { 
            color: var(--primary); 
            opacity: 1;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-text h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 650px;
            border: 1px solid var(--border);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -1px; left: 50px; right: 50px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .form-group { margin-bottom: 24px; }
        
        label { 
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px; 
            font-weight: 600; 
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.15);
        }

        input[readonly] {
            background: rgba(30, 41, 59, 0.4);
            color: var(--primary);
            border-style: dashed;
            cursor: not-allowed;
            font-weight: bold;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary), #00a8cc);
            color: #050a18;
            border: none;
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover { 
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 212, 255, 0.3);
            filter: brightness(1.1);
        }

        /* --- BOTÓN FLOTANTE --- */
        .whatsapp-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--whatsapp);
            color: white !important;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            text-decoration: none;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .whatsapp-float:hover {
            transform: scale(1.15) rotate(10deg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header { padding: 1.2rem 5%; }
            .container { padding: 25px; }
            .header-text h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">NET_SUPPORT</a>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="soporte.html" class="active">Soporte</a>
    </nav>
</header>

<div class="main-content">
    <div class="header-text">
        <h1>Centro de Soporte Técnico</h1>
        <p style="color: var(--text-dim);">Apertura de tickets para incidencias de red, servidores y hardware.</p>
    </div>

    <div class="container">
        <form action="https://hooks.zapier.com/hooks/catch/27279269/uj5pse1/" method="POST" id="ticketForm">
            <input type="hidden" id="ticket_id" name="ID_Ticket">

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label><i class="fas fa-hashtag"></i> ID Ticket</label>
                    <input type="text" id="display_id" readonly>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label><i class="fas fa-calendar-alt"></i> Fecha</label>
                    <input type="text" id="fecha" name="fecha" readonly>
                </div>
            </div>

            <div class="form-group">
                <label for="cliente"><i class="fas fa-building"></i> Cliente / Empresa</label>
                <input type="text" id="cliente" name="cliente" required placeholder="Nombre completo o razón social">
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email de contacto</label>
                <input type="email" id="email" name="email" required placeholder="correo@empresa.com">
            </div>

            <div class="form-group">
                <label for="asunto"><i class="fas fa-exclamation-circle"></i> Asunto</label>
                <select id="asunto" name="asunto" required>
                    <option value="" disabled selected>Selecciona el tipo de avería</option>
                    <option value="Red/Internet">Fallo de Red / Internet (Router/Switch)</option>
                    <option value="Servidor">Incidencia en Servidor / Datos</option>
                    <option value="Hardware">Problema de Hardware (PC/Impresora)</option>
                    <option value="Software">Error de Software / Licencias</option>
                    <option value="Otros">Otras consultas</option>
                </select>
            </div>

            <div class="form-group">
                <label for="mensaje"><i class="fas fa-comment-alt"></i> Descripción del Problema</label>
                <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Describe brevemente lo ocurrido para que el técnico vaya preparado..."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <span>Enviar Ticket a Central</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>

<a href="https://wa.me/34600000000?text=Hola,%20necesito%20asistencia%20técnica%20urgente" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    window.onload = function() {
        // Generar ID de ticket
        const randomNum = Math.floor(Math.random() * 90000) + 10000;
        const finalID = "TKT-" + randomNum;
        document.getElementById('ticket_id').value = finalID;
        document.getElementById('display_id').value = finalID;

        // Fecha actual
        const hoy = new Date();
        const opciones = { year: 'numeric', month: '2-digit', day: '2-digit' };
        document.getElementById('fecha').value = hoy.toLocaleDateString('es-ES', opciones);
    };
</script>
        
</body>
</html>
