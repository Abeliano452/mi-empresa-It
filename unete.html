<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete al Equipo | TechSupport & Network Solution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #00d4ff;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--secondary-color);
            text-decoration: none;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input[type="file"] {
            padding: 10px;
            background: #1e293b;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: white;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            border-top: 1px solid #334155;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">NET_SUPPORT</a>
    </header>

    <div class="container">
        <div class="card">
            <h1>Trabaja con Nosotros</h1>
            <p class="subtitle">Buscamos talentos para el área de Soporte y Redes.</p>

            <form action="https://formspree.io/f/mlgzageo" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" name="email" placeholder="juan@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label>Área de Interés</label>
                    <select name="area">
                        <option value="Soporte Técnico">Soporte Técnico</option>
                        <option value="Instalación de Redes">Instalación de Redes</option>
                        <option value="Ciberseguridad">Ciberseguridad</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Adjunta tu CV (PDF o Word)</label>
                    <input type="file" name="curriculum" accept=".pdf,.doc,.docx" required>
                </div>

                <div class="form-group">
                    <label>¿Por qué quieres unirte?</label>
                    <textarea name="mensaje" rows="3" placeholder="Cuéntanos un poco sobre ti..."></textarea>
                </div>

                <button type="submit" class="btn">Enviar Candidatura</button>

            </form>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Net Support IT Services. Todos los derechos reservados.
    </footer>

</body>
</html>
