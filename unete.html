<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete al equipo - TechSupport & Network Solution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css"> </head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">TechSupport & Network Solution</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Trabaja con Nosotros</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-center text-muted">Sube tu currículum y nos pondremos en contacto contigo.</p>
                        
                        <form action="https://formspree.io/f/tu_nuevo_id" method="POST" enctype="multipart/form-data">
                            
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Nombre Completo</label>
                                <input type="text" name="nombre" class="form-control" placeholder="Ej: Mario Rossi" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Puesto de interés</label>
                                <select name="puesto" class="form-select">
                                    <option value="soporte">Técnico de Soporte</option>
                                    <option value="redes">Especialista en Redes</option>
                                    <option value="ventas">Asesor Comercial IT</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Adjunta tu CV (PDF o Word)</label>
                                <input type="file" name="cv_file" class="form-control" accept=".pdf,.doc,.docx" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Breve presentación (Opcional)</label>
                                <textarea name="mensaje" class="form-control" rows="3"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2">Enviar Candidatura</button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none">← Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted">
        &copy; 2026 TechSupport & Network Solution
    </footer>

</body>
</html>
